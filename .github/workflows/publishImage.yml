name: Publish Docker image to Dockerhub
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
'on':
  workflow_dispatch: null
  push:
    branches:
    - main
    tags:
    - '*.*.*'
    paths-ignore:
    - README.md
    - .github/**
    - docsite/**
jobs:
  test:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/testAndSanity.yml
  build:
    name: Build OCI Images
    if: ${{ github.event_name != 'pull_request' && (vars.DOCKERHUB_SLUG != '' ||  vars.GHCR_SLUG
      != '') }}
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          arch: amd64
          platform: linux/amd64
        - os: ubuntu-latest
          arch: arm64
          platform: linux/arm64
    steps:
    - name: Prepare
      run: "platform=${{ matrix.platform }}\necho \"PLATFORM_PAIR=${platform//\\//-}\"\
        \ >> $GITHUB_ENV     \n\n# list all registries to push to and join all non-empty\
        \ with comma\n# https://unix.stackexchange.com/a/693165/116849\n# https://stackoverflow.com/a/9429887/1469797\n\
        strings=(\"${{vars.DOCKERHUB_SLUG}}\" \"${{vars.GHCR_SLUG}}\")\nfor i in ${!strings[@]};\
        \ do [[ -z ${strings[i]} ]] && unset strings[i]; done\njoined_string=$(IFS=,\
        \ ; echo \"${strings[*]}\")\necho \"REGISTRIES_JOINED=$joined_string\" >>\
        \ $GITHUB_ENV \n"
    - name: Check out the repo
      uses: actions/checkout@v4
    - name: Set short git commit SHA
      id: appvars
      run: 'calculatedSha=$(git rev-parse --short HEAD)

        branchName=$(git rev-parse --abbrev-ref HEAD)

        echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

        echo "COMMIT_BRANCH=$branchName" >> $GITHUB_ENV

        '
    - name: Get App Version
      id: appversion
      env:
        APP_VERSION: ${{ contains(github.ref, 'refs/tags/') && github.ref_name ||
          format('{0}-{1}', env.COMMIT_BRANCH, env.COMMIT_SHORT_SHA ) }}
      run: 'echo appversion=$APP_VERSION >>${GITHUB_OUTPUT}

        '
    - name: Login to Docker Hub
      if: ${{ github.event_name != 'pull_request' && vars.DOCKERHUB_SLUG != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Login to GitHub Container Registry
      if: ${{ github.event_name != 'pull_request' && vars.GHCR_SLUG != '' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v6
      with:
        build-args: 'APP_BUILD_VERSION=${{steps.appversion.outputs.appversion}}

          '
        platforms: ${{ matrix.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        outputs: type=image,"name=${{ env.REGISTRIES_JOINED }}",push-by-digest=true,name-canonical=true,push=true
    - name: Export digest
      run: "mkdir -p /tmp/digests\ndigest=\"${{ steps.build.outputs.digest }}\"\n\
        touch \"/tmp/digests/${digest#sha256:}\"          \n"
    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1
  merge:
    name: Merge OCI Images and Push
    if: ${{ github.event_name != 'pull_request' && (vars.DOCKERHUB_SLUG != '' ||  vars.GHCR_SLUG
      != '') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    needs:
    - build
    - test
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true
    - name: Login to Docker Hub
      if: ${{ github.event_name != 'pull_request' && vars.DOCKERHUB_SLUG != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Login to GitHub Container Registry
      if: ${{ github.event_name != 'pull_request' && vars.GHCR_SLUG != '' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: '${{ vars.DOCKERHUB_SLUG }}

          ${{ vars.GHCR_SLUG }}

          '
        tags: 'type=edge


          # push with branch name as tag if not master/main

          type=ref,event=branch,enable=${{ !endsWith(github.ref, ''main'') }}


          # tag non-prelease as latest -- has a higher priority than regular tag so
          it shows first in registries

          type=match,pattern=\d.\d.\d$,priority=901


          # tag all semver (include pre-release)

          type=semver,pattern={{version}}

          '
        labels: 'org.opencontainers.image.title=Komodo Import

          org.opencontainers.image.description=Import existing resources into Komodo

          org.opencontainers.image.vendor=FoxxMD

          '
    - name: Create manifest list and push dockerhub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      working-directory: /tmp/digests
      run: "docker buildx imagetools create $(jq -cr '.tags | map(\"-t \" + .) | join(\"\
        \ \")' <<< \"$DOCKER_METADATA_OUTPUT_JSON\") \\\n  $(printf '${{ vars.DOCKERHUB_SLUG\
        \ }}@sha256:%s ' *)\n"
    - name: Create manifest list and push gchr
      if: ${{ vars.GHCR_SLUG != '' }}
      working-directory: /tmp/digests
      run: "docker buildx imagetools create $(jq -cr '.tags | map(\"-t \" + .) | join(\"\
        \ \")' <<< \"$DOCKER_METADATA_OUTPUT_JSON\") \\\n  $(printf '${{ vars.GHCR_SLUG\
        \ }}@sha256:%s ' *)    \n"
    - name: Inspect image dockerhub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      run: 'docker buildx imagetools inspect ${{ vars.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.version
        }}

        '
    - name: Inspect image ghcr
      if: ${{ vars.GHCR_SLUG != '' }}
      run: 'docker buildx imagetools inspect ${{ vars.GHCR_SLUG }}:${{ steps.meta.outputs.version
        }}   '
